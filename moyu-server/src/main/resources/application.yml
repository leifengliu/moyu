spring:
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/moyu_coffee?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: moyu-coffee-jwt-secret-key-2026-must-be-at-least-256-bits-long
  expiration: 604800000  # 7 days in milliseconds

wx:
  miniapp:
    appid: wxc453ee274ce2ddef
    secret: 40311c9840879e3303e592b9421fe4a4
    msg-data-format: JSON

server:
  port: 8080

logging:
  level:
    com.moyucoffee: debug
