spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/moyu_coffee?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: ${JWT_SECRET:moyu-coffee-jwt-secret-key-2026-must-be-at-least-256-bits-long}
  expiration: 604800000

wx:
  miniapp:
    appid: ${WX_APPID:your-appid}
    secret: ${WX_SECRET:your-secret}
    msg-data-format: JSON

admin:
  username: ${ADMIN_USERNAME:root}
  password: ${ADMIN_PASSWORD:root}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.moyucoffee: ${LOG_LEVEL:info}
